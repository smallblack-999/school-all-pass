<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 歐帕糖保衛戰 - 極速穩定版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: white; font-size: 24px; font-weight: bold; pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); z-index: 10;
        }
        #instructions {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: #ccc; font-size: 16px; pointer-events: none; z-index: 10;
        }
    </style>
    <!-- 更換為全球連線最快、最穩定的 cdnjs 加速伺服器 -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="ui">🏫 3D 歐帕糖保衛戰：<span id="score">0</span>/5 顆 | 狀態：<span id="status" style="color: #ffffd0;">躲藏中</span></div>
    <div id="instructions">【學生控制】WASD 或方向鍵移動 | 【空白鍵】變身成 3D 課桌椅（不動時免疫粉筆！）</div>

    <script>
        // 確保 3D 引擎完全準備好後再執行
        window.addEventListener('load', () => {
            if (typeof THREE !== 'undefined') {
                initGame();
            } else {
                // 如果連 cdnjs 都慢，直接動態生成基礎核心，確保不卡黑畫面
                alert("正在切換備用高速節點，請點擊確定...");
                let script = document.createElement('script');
                script.src = "https://jsdelivr.net";
                script.onload = () => { initGame(); };
                document.head.appendChild(script);
            }
        });

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a1a);

            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            // 避免重複生成畫布
            if(document.getElementsByTagName('canvas').length === 0) {
                document.body.appendChild(renderer.domElement);
            }

            // 燈光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.6);
            dirLight.position.set(10, 20, 10);
            scene.add(dirLight);

            // 3D 教室地板
            const floorGeo = new THREE.BoxGeometry(30, 0.5, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x1e3d2f, roughness: 0.5 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.25; 
            scene.add(floor);

            // 3D 學生與變身幾何體
            const humanGeo = new THREE.BoxGeometry(1, 1.6, 1); 
            const chairGeo = new THREE.BoxGeometry(1.2, 1.0, 1.2); 
            const studentMat = new THREE.MeshStandardMaterial({ color: 0xffd700 }); 
            const chairMat = new THREE.MeshStandardMaterial({ color: 0x8B4513, roughness: 0.6 }); 

            const student = new THREE.Mesh(humanGeo, studentMat);
            student.position.set(-10, 0.8, 0); 
            scene.add(student);

            let isChair = false; 
            let isMoving = false;
            let score = 0;
            let gameOver = false;

            // 3D 老師
            const teacherGeo = new THREE.CylinderGeometry(0.6, 0.6, 1.8, 16);
            const teacherMat = new THREE.MeshStandardMaterial({ color: 0xff4500 });
            const teacher = new THREE.Mesh(teacherGeo, teacherMat);
            teacher.position.set(10, 0.9, 0); 
            scene.add(teacher);

            // 3D 歐帕糖
            const candyGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const candyMat = new THREE.MeshStandardMaterial({ color: 0xff69b4, emissive: 0xff1493 });
            const candy = new THREE.Mesh(candyGeo, candyMat);
            resetCandy();
            scene.add(candy);

            function resetCandy() {
                candy.position.set(Math.random() * 16 - 8, 0.4, Math.random() * 14 - 7);
            }

            let chalks = [];

            camera.position.set(0, 16, 15);
            camera.lookAt(0, 0, -2);

            const keys = {};
            window.addEventListener('keydown', (e) => {
                keys[e.key.toLowerCase()] = true;
                if (e.code === 'Space' && !gameOver) {
                    e.preventDefault();
                    isChair = !isChair;
                    if (isChair) {
                        student.geometry = chairGeo;
                        student.material = chairMat;
                        document.getElementById('status').innerText = "已偽裝成課桌椅";
                        document.getElementById('status').style.color = "#a0ffa0";
                    } else {
                        student.geometry = humanGeo;
                        student.material = studentMat;
                        document.getElementById('status').innerText = "學生型態";
                        document.getElementById('status').style.color = "#ffd700";
                    }
                }
                if (["arrowup", "arrowdown", "arrowleft", "arrowright"].includes(e.code.toLowerCase())) {
                    e.preventDefault();
                }
            });
            window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

            let lastShot = 0;

            function animate(timestamp) {
                if (gameOver) return;
                requestAnimationFrame(animate);

                isMoving = false;
                const moveSpeed = 0.12;
                if (keys['w'] || keys['arrowup']) { student.position.z -= moveSpeed; isMoving = true; }
                if (keys['s'] || keys['arrowdown']) { student.position.z += moveSpeed; isMoving = true; }
                if (keys['a'] || keys['arrowleft']) { student.position.x -= moveSpeed; isMoving = true; }
                if (keys['d'] || keys['arrowright']) { student.position.x += moveSpeed; isMoving = true; }

                student.position.x = Math.max(-14, Math.min(14, student.position.x));
                student.position.z = Math.max(-9, Math.min(9, student.position.z));

                teacher.lookAt(student.position.x, teacher.position.y, student.position.z);

                if (timestamp - lastShot > 1200) {
                    lastShot = timestamp;
                    const chalkGeo = new THREE.SphereGeometry(0.18, 8, 8);
                    const chalkMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                    const chalk = new THREE.Mesh(chalkGeo, chalkMat);
                    chalk.position.copy(teacher.position);
                    chalk.position.y = 1.2;

                    const direction = new THREE.Vector3().subVectors(student.position, teacher.position).normalize();
                    chalks.push({ mesh: chalk, dir: direction });
                    scene.add(chalk);
                }

                for (let i = chalks.length - 1; i >= 0; i--) {
                    const c = chalks[i];
                    c.mesh.position.addScaledVector(c.dir, 0.25);

                    let dist = c.mesh.position.distanceTo(student.position);
                    if (dist < 1.0) {
                        if (isMoving || !isChair) {
                            document.getElementById('status').innerText = "被粉筆砸中！退學重修！";
                            document.getElementById('status').style.color = "#ff4d4d";
                            gameOver = true;
                        }
                        scene.remove(c.mesh);
                        chalks.splice(i, 1);
                        continue;
                    }

                    if (c.mesh.position.x < -16 || c.mesh.position.x > 16 || c.mesh.position.z < -11 || c.mesh.position.z > 11) {
                        scene.remove(c.mesh);
                        chalks.splice(i, 1);
                    }
                }

                if (student.position.distanceTo(candy.position) < 1.2) {
                    score++;
                    document.getElementById('score').innerText = score;
                    if (score >= 5) {
                        document.getElementById('status').innerText = "成功拿到 5 顆歐帕糖！順利畢業！";
                        document.getElementById('status').style.color = "#00ff00";
                        gameOver = true;
                    } else {
                        resetCandy();
                    }
                }

                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
