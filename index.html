<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>瘋狂班導 - 期末大老二爭霸賽</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .game-container { max-width: 600px; width: 100%; background: #2a2a2a; border-radius: 12px; padding: 25px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); text-align: center; border: 2px solid #ff4757; }
        .image-placeholder { width: 100%; height: 250px; background: #3d3d3d; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px; border: 2px dashed #ff7f50; }
        .story-text { font-size: 18px; line-height: 1.6; margin-bottom: 25px; text-align: left; background: #1e1e1e; padding: 15px; border-radius: 6px; border-left: 5px solid #ff4757; }
        .btn-container { display: flex; flex-direction: column; gap: 12px; }
        button { background: #ff4757; color: white; border: none; padding: 15px 20px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; text-align: left; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: #ff6b81; transform: translateY(-2px); }
        button:active { transform: translateY(1px); }
        .restart-btn { background: #2ed573; text-align: center; }
        .restart-btn:hover { background: #26af5f; }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- 畫面上方顯示：搞笑迷因圖區（未來可換成真實照片） -->
        <div id="game-image" class="image-placeholder">🤤💤</div>
        
        <!-- 文字顯示區 -->
        <div id="game-story" class="story-text">
            載入中...
        </div>
        
        <!-- 下方三個按鈕區 -->
        <div id="game-options" class="btn-container">
            <!-- 按鈕會由 JavaScript 動態生成 -->
        </div>
    </div>

    <script>
        // 劇情資料庫（文字與選項結構）
        const storyData = {
            start: {
                text: "【早上 8:45，你猛然驚醒！】<br><br>今天大老二期末爭霸賽你快遲到了，而且這堂課的教授超級嚴格，遲到直接當掉。這時候你決定...",
                image: "🤤💤",
                options: [
                    { text: "👉 【按鈕 A】：施展火影跑，用時速 50 公里狂飆去學校！", nextNode: "routeA_fail" },
                    { text: "👉 【按鈕 B】：打電話給教授，騙他說你被外星人綁架了。", nextNode: "routeB_step2" },
                    { text: "👉 【按鈕 C】：既然都遲到了，乾脆躺回去繼續睡，下午再去吃烤肉。", nextNode: "routeC_fail" }
                ]
            },
            // 選項 A 結局
            routeA_fail: {
                text: "【結局：物理崩壞】<br><br>你全速狂飆，試圖突破人體極限。沒想到在校門口過彎時，因為時速過快摩擦生熱，你的鞋底直接燒起來，最後連人帶鞋滑進警衛室。被當場依涉及危險駕駛移送法辦，期末賽直接出局。<br><br>❌ 挑戰失敗！教授無情地給了你一個 0 分。",
                image: "🏃‍♂️🔥",
                options: [{ text: "🔄 重新投胎，這次早點起床", nextNode: "start", isRestart: true }]
            },
            // 選項 C 結局
            routeC_fail: {
                text: "【結局：鹹魚的代價】<br><br>你蓋上棉被繼續大睡。下午你確實吃到了香噴噴的烤肉，但當你打開手機看群組時，發現教授發了公告：『今天沒來參加大老二爭霸賽的，明年請早。』<br><br>❌ 挑戰失敗！你獲得了重修的榮譽車票。",
                image: "🥩😴",
                options: [{ text: "🔄 不甘心！重新挑戰", nextNode: "start", isRestart: true }]
            },
            // 選項 B 的下一輪分支（新的 ABC 選項）
            routeB_step2: {
                text: "【電話接通了...】<br><br>你用顫抖的聲音大喊：『教授！我被外星人綁架了！他們要研究我的大老二技術！』<br><br>教授沉默了五秒，竟然回答：『喔？是嗎？剛好我最近在做星際社會學研究，那你現在要怎麼向我證明？』<br><br>這時候你決定再出哪一招：",
                image: "👽📞",
                options: [
                    { text: "👉 【按鈕 A】：用嘴巴發出『嗶嗶啵啵』的電子微波音效，假裝訊號不好。", nextNode: "routeB_A_fail" },
                    { text: "👉 【按鈕 B】：大喊『為了地球的和平！』然後直接掛教授電話。", nextNode: "routeB_B_fail" },
                    { text: "👉 【按鈕 C】：說外星人要跟你賭一把大老二，贏了才放你走，邀請教授線上語音當軍師。", nextNode: "routeB_C_win" }
                ]
            },
            // B-A 失敗
            routeB_A_fail: {
                text: "【結局：拙劣的演技】<br><br>你『嗶啵』了半天，教授冷冷地說：『同學，你的背景聲音有摩托車除草的聲音，而且你按到擴音了。』隨後傳來一聲掛斷的嘟嘟聲。<br><br>❌ 挑戰失敗！你的智商受到了教授的無情羞辱，並且被當掉了。",
                image: "🤡❌",
                options: [{ text: "🔄 換個劇本重新挑戰", nextNode: "start", isRestart: true }]
            },
            // B-B 失敗
            routeB_B_fail: {
                text: "【結局：不可饒恕】<br><br>你霸氣掛掉電話。等下午你清醒走到學校時，發現你的置物櫃已經被清空，教授在黑板上寫著你的大名，旁邊畫了一個大大的叉叉。<br><br>❌ 挑戰失敗！敢掛瘋狂班導的電話，你是第一人，也是重修的第一人。",
                image: "🤬💥",
                options: [{ text: "🔄 乖乖重來，這次客氣點", nextNode: "start", isRestart: true }]
            },
            // B-C 唯一通關結局
            routeB_C_win: {
                text: "【👑 唯一通關：大老二星際外交官】<br><br>教授一聽到『外星人要賭大老二』，身為瘋狂班導的賭性瞬間被激發！他立刻在電話裡瘋狂指導你：『聽著！先出鐵支！不要留梅花三！』<br><br>在教授的遠端神指揮下，你成功（在想像中）擊敗了外星人。教授非常高興，認為你為地球爭光，不僅沒當你，還直接給了你期末總成績 100 分！<br><br>🎉 恭喜通關！你成為了傳說中的星際大老二之神！",
                image: "👑🃏",
                options: [{ text: "🎉 太神啦！再玩一局", nextNode: "start", isRestart: true }]
            }
        };

        // 遊戲核心驅動函式
        function goToNode(nodeKey) {
            const node = storyData[nodeKey];
            if (!node) return;

            // 更新搞笑迷因圖標 / 照片區
            document.getElementById('game-image').innerHTML = node.image;
            
            // 更新故事文字
            document.getElementById('game-story').innerHTML = node.text;
            
            // 清空舊按鈕並生成新按鈕
            const optionsContainer = document.getElementById('game-options');
            optionsContainer.innerHTML = "";
            
            node.options.forEach(opt => {
                const button = document.createElement('button');
                button.innerHTML = opt.text;
                
                // 如果是重新開始按鈕，給予特殊綠色外觀
                if (opt.isRestart) {
                    button.classList.add('restart-btn');
                }
                
                // 綁定點擊事件，通往下一段劇情
                button.addEventListener('click', () => {
                    goToNode(opt.nextNode);
                });
                
                optionsContainer.appendChild(button);
            });
        }

        // 遊戲初始化，從 start 節點開始
        goToNode('start');
    </script>
</body>
</html>
